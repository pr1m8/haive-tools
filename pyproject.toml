[tool.poetry]
name = "haive-tools"
version = "0.1.0"
description = "Tools and utilities for the Haive framework"
authors = ["0rac130fD31phi <william.astley@algebraicwealth.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "haive_tools", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.12,<3.13"
haive-core = {path = "../haive-core", develop = true}

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
black = "^25.1.0"
isort = "^6.0.1"
mypy = "^1.15.0"

[tool.poetry.scripts]
haive-tools = "haive_tools.cli.main:main"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
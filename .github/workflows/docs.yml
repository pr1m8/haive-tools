name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          poetry install --with docs --no-interaction || poetry install --no-interaction
          poetry run pip install lazy_loader

      - name: Build Sphinx docs (warnings allowed)
        continue-on-error: true
        run: poetry run sphinx-build -b html docs/source docs/build/html

      - name: Ensure output exists
        run: |
          mkdir -p docs/build/html
          [ -f docs/build/html/index.html ] || echo "<!DOCTYPE html><html><head><title>Docs</title></head><body><h1>Docs building</h1><p>Sphinx build had warnings. See <a href='https://github.com/pr1m8/haive-tools/actions'>Actions</a>.</p></body></html>" > docs/build/html/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
